hint.outputHint=<div style='text-align: center;'>说明：本程序分为两种模式：大范围和十字路口<br>大范围支持搜索堡垒的大范围边框大小<br>十字路口支持搜索特定布局的灵魂沙峡谷多联十字路口<br>当选择大范围模式时大范围长边和大范围短边的条件生效，取值范围为0~260<br>当选择十字路口模式时十字路口最低条件生效<br>选项中的二联代表并排的一对十字路口<br>三联代表呈L型分布的三个十字路口<br>四联代表2*2布局的4个十字路口<br>要求以十字路口为中心半径64格内只存在灵魂沙峡谷群系</div>
